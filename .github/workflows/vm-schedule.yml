name: VM Schedule (Start/Stop)

# Mon–Fri: start at 03:00 UTC, stop at 00:00 UTC (midnight)
# Weekends: VM stays off

on:
  schedule:
    - cron: '0 3 * * 1-5'   # Mon–Fri 03:00 UTC → START
    - cron: '0 0 * * 2-6'   # Tue–Sat 00:00 UTC → STOP (end of Mon–Fri trading day)
  workflow_dispatch:
    inputs:
      action:
        description: 'start or stop'
        required: true
        default: 'start'
        type: choice
        options: [start, stop]

jobs:
  manage-vm:
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Determine action
        id: action
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "action=${{ inputs.action }}" >> $GITHUB_OUTPUT
          elif [ "$(date -u +%H)" = "03" ]; then
            echo "action=start" >> $GITHUB_OUTPUT
          else
            echo "action=stop" >> $GITHUB_OUTPUT
          fi

      - name: Start VM
        if: steps.action.outputs.action == 'start'
        run: |
          echo "Starting trader-bot-vm..."
          az vm start \
            --name trader-bot-vm \
            --resource-group rg-trader-ai \
            --no-wait
          echo "VM start command issued."

      - name: Stop VM (deallocate)
        if: steps.action.outputs.action == 'stop'
        run: |
          echo "Deallocating trader-bot-vm..."
          az vm deallocate \
            --name trader-bot-vm \
            --resource-group rg-trader-ai \
            --no-wait
          echo "VM deallocate command issued."
