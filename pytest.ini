[pytest]
# Mirrors PYTHONPATH="/app/src" set in Dockerfile so imports like
# `from core.config import get_settings` resolve identically in tests.
pythonpath = src

# Basic settings
testpaths = tests
python_files = test_*.py
python_functions = test_*
python_classes = Test*

# Clean up console output
addopts = -v --strict-markers

asyncio_mode = auto
asyncio_default_fixture_loop_scope = function