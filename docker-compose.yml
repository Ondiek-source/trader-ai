version: "3.9"

services:
  trader-ai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trader-ai
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Persist local fallback data across container restarts
      - fallback-data:/tmp/fallback
    ports:
      - "8080:8080"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "pgrep", "-f", "python main.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  fallback-data:
